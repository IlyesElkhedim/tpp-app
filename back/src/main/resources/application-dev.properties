# Configuration TPP - Development Profile
# Utilisee avec SPRING_PROFILES_ACTIVE=dev

spring.application.name=TPP-Application

# CORS - VM de dev (front sur :80, dev local sur :5173)
cors.allowed-origins=http://192.168.74.140,http://192.168.74.140:80,http://localhost:5173,http://localhost
server.servlet.context-path=/
server.port=8080

# Datasource - Development
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:tpp_dev}
spring.datasource.username=${POSTGRES_USER:tpp_user_dev}
spring.datasource.password=${POSTGRES_PASSWORD:tpp_password_dev}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA/Hibernate - Development
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# SQL Data Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=false

# Logging - Development
logging.level.root=INFO
logging.level.back.projet.tpp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Actuator - Development
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Europe/Paris
spring.jackson.serialization.indent-output=true

# Swagger/OpenAPI - Development
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false
# Configuration pour SpringDoc 2.7.0
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

