spring.application.name=projet.tpp
spring.profiles.active=dev
server.port=8080

# CORS - origines autorisées (local par défaut, surchargé par les profils)
cors.allowed-origins=http://localhost:5173,http://localhost,http://localhost:80,http://192.168.74.140,http://192.168.74.140:80,http://192.168.74.146,http://192.168.74.146:80,

# Datasource Configuration (peut etre surchargee par profils)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:tpp_dev}
spring.datasource.username=${POSTGRES_USER:tpp_user_dev}
spring.datasource.password=${POSTGRES_PASSWORD:tpp_password_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# SQL Data Initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=false

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Europe/Paris
spring.jackson.serialization.indent-output=true

# Actuator
management.endpoints.web.exposure.include=health,actuator
management.endpoint.health.show-details=always