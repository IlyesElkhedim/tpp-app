server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy toutes les requêtes API vers le backend (réseau Docker interne)
    location /api/ {
        proxy_pass http://app-backend-prod:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Swagger UI (accès au besoin, peut être retiré en prod stricte)
    location /swagger-ui/ {
        proxy_pass http://app-backend-prod:8080/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api-docs {
        proxy_pass http://app-backend-prod:8080/api-docs;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
